name: Build Android APK (No EAS)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install dependencies
      run: npm install
    
    - name: Inject env vars into app.config.js
      run: |
        sed -i 's|process.env.EXPO_PUBLIC_SUPABASE_URL|"${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}"|g' app.config.js
        sed -i 's|process.env.EXPO_PUBLIC_SUPABASE_ANON_KEY|"${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}"|g' app.config.js
        sed -i 's|process.env.EXPO_PUBLIC_GEMINI_API_KEY|"${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}"|g' app.config.js
        cat app.config.js
    
    - name: Expo prebuild
      run: npx expo prebuild --platform android
      env:
        EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
        EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}
    
    - name: Build APK with Gradle
      run: |
        cd android
        ./gradlew assembleRelease
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release.apk
